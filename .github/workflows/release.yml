# Release: manually triggered from the Actions tab. Bumps the version, builds
# and tests, generates release notes from the release's GitHub issues, packs an
# extensions.gnome.org-ready zip, commits + tags the bump (with the regenerated
# CHANGELOG.md + docs/releases.json), publishes a GitHub Release with the notes
# and zip, closes the release milestone, and (best-effort) submits the zip to
# extensions.gnome.org for manual review. See ../../docs/release.md.
name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semver part to increment (none = release current version as-is)'
        type: choice
        options: [patch, minor, major, none]
        default: patch
      milestone:
        description: 'Milestone title holding this release''s issues (blank = auto vA.B.C)'
        type: string
        required: false
        default: ''

permissions:
  contents: write
  issues: write

# EGO credentials are optional: mapped from secrets to env so the upload step
# can be skipped (rather than failing) when they are absent.
env:
  EGO_USERNAME: ${{ secrets.EGO_USERNAME }}
  EGO_PASSWORD: ${{ secrets.EGO_PASSWORD }}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install tooling
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-bin zip

      - run: npm ci

      # Bump metadata.json (version + version-name) and package.json; expose the
      # new version-name (and integer code) to later steps.
      - name: Bump version (${{ inputs.bump }})
        id: bump
        run: node .github/scripts/bump-version.mjs "${{ inputs.bump }}"

      - name: Type-check
        run: npm run typecheck

      - name: Build + unit tests
        run: npm test

      - name: Pack extension zip
        run: npm run pack

      # Collect the release milestone's closed issues into dist/release-notes.md
      # and regenerate CHANGELOG.md + docs/releases.json. Uses the job token to
      # read issues; degrades to auto-only notes when no milestone matches.
      - name: Generate release notes
        id: notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_CODE: ${{ steps.bump.outputs.code }}
          RELEASE_MILESTONE: ${{ inputs.milestone }}
        run: |
          RELEASE_DATE="$(date -u +%Y-%m-%d)" \
            node .github/scripts/release-notes.mjs "${{ steps.bump.outputs.version }}"

      - name: Commit and tag the release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add extension-src/metadata.json package.json CHANGELOG.md docs/releases.json
          git commit -m "release: v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD:${{ github.ref_name }} --follow-tags

      # Body = our issue-based notes; generate_release_notes appends GitHub's
      # auto "What's Changed" (merged PRs, new contributors) beneath it. The body
      # stays editable on GitHub after publication.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          body_path: dist/release-notes.md
          generate_release_notes: true
          files: dist/*.shell-extension.zip

      # Rename (to vA.B.C) and close the release milestone so it archives exactly
      # which issues shipped in this version. Skipped when no milestone matched.
      - name: Close release milestone
        if: ${{ steps.notes.outputs.milestone_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X PATCH \
            "repos/${{ github.repository }}/milestones/${{ steps.notes.outputs.milestone_number }}" \
            -f title="v${{ steps.bump.outputs.version }}" \
            -f state="closed" \
            -f description="Released ${{ steps.notes.outputs.notes_url }}"

      # extensions.gnome.org has no official API; this drives the upload form and
      # only submits the version for GNOME's manual review. Non-fatal: the
      # GitHub Release above is the reliable artifact. Skipped when EGO_* secrets
      # are not configured.
      - name: Submit to extensions.gnome.org (manual review)
        if: ${{ env.EGO_USERNAME != '' && env.EGO_PASSWORD != '' }}
        continue-on-error: true
        run: python3 .github/scripts/ego-upload.py dist/*.shell-extension.zip
