name: Feature request
description: Suggest an idea or improvement for GNOME Widget Panel
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Tell us what you would like to see and
        why. Others can vote for it with GitHub reactions.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: >-
        What problem does this solve? Is your feature request related to a
        frustration or missing capability?
      placeholder: I want to ...
    validations:
      required: false
  - type: textarea
    id: idea
    attributes:
      label: Proposed idea
      description: A clear description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you have considered.
    validations:
      required: false
